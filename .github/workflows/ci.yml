name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Placeholder Postgres URLs — build uses query fallbacks when DB is unreachable.
      # prisma migrate deploy is NOT run here; see deploy-migrate.yml and docs/DEPLOYMENT.md.
      # tests/smoke.test.ts verifies public route ↔ page file mapping without a live database.
      # No live database or production secrets required for this workflow.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
      AUTH_SECRET: ci-test-auth-secret-for-github-actions-only
      NEXTAUTH_SECRET: ci-test-auth-secret-for-github-actions-only
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      STORAGE_DRIVER: local
      RATE_LIMIT_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
