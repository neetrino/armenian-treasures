name: Deploy database migrations

# Applies Prisma migrations to production Neon.
# PR CI (ci.yml) intentionally does NOT run migrate deploy — it uses placeholder DB URLs.

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'

concurrency:
  group: deploy-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: prisma migrate deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Validate database secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL is not set. Add it under Settings → Secrets → Actions (production environment)."
            exit 1
          fi
          if [ -z "${DIRECT_URL}" ]; then
            echo "::warning::DIRECT_URL is not set; using DATABASE_URL for migrate deploy."
            echo "For Neon, add DIRECT_URL as the non-pooled connection string (without -pooler in the host)."
            echo "DIRECT_URL=${DATABASE_URL}" >> "$GITHUB_ENV"
          fi

      - name: Apply pending migrations
        run: pnpm prisma migrate deploy

      - name: Verify migration status
        run: pnpm prisma migrate status
